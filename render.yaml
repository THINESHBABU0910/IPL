# Render Blueprint — free web service (no credit card on signup for basic deploy)
# Dashboard: https://dashboard.render.com → New → Blueprint → connect repo
services:
  - type: web
    name: ipl-auction
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: AI_GATEWAY_BASE_URL
        value: https://aigateway-uat.sifymdp.digital/api/v1
      - key: AI_GATEWAY_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: GIPHY_API_KEY_A
        sync: false
      - key: GIPHY_API_KEY_B
        sync: false
